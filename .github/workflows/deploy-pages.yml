name: Deploy frontend on main

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "articles/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - name: Pull existing data/ from gh-pages
        run: |
          git fetch origin gh-pages || true
          mkdir -p _existing
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=_existing checkout origin/gh-pages -- data || true
          fi

      - name: Seed app/public/data so build-time fs reads find the artifacts
        run: |
          mkdir -p app/public/data
          # gh-pages is the source of truth for CI-managed artifacts.
          # Copy everything FRESH on every deploy so the Next.js static
          # export bundles match what refresh-pipelines just published.
          #
          # Why not `cp -rn` (no-clobber, the old behavior): it gave repo
          # files priority forever. A one-time committed snapshot of
          # kpis_per_ticker.json (50 tickers, 2026-05-21) silently capped
          # the deployed universe at 50 tickers for 4 days post-IRBR fix
          # — every refresh-pipelines run successfully pushed a fresh
          # 290-ticker artifact, and every subsequent deploy-pages run
          # rebuilt the static export from the stale repo copy. CI
          # artifacts are now .gitignored (see `.gitignore`); the ONE
          # exception is `mclean_results.json` (hand-maintained override
          # for shipping McLean fixes before the next refresh runs),
          # which we restore from the repo AFTER the gh-pages seed below.
          if [ -d _existing/data ]; then
            cp -r _existing/data/. app/public/data/
          fi
          # Defensive cleanup: legacy refresh-pipelines / deploy-pages
          # runs nested `data/data/data/...` into gh-pages (see commit
          # message of the fix that introduced this comment). Strip any
          # nested `data/` subdir so we don't propagate the nesting.
          rm -rf app/public/data/data
          # Restore the repo-committed McLean override (if present),
          # winning over whatever's on gh-pages.
          if git show HEAD:app/public/data/mclean_results.json > /tmp/mclean_repo.json 2>/dev/null; then
            cp /tmp/mclean_repo.json app/public/data/mclean_results.json
          fi
          ls -la app/public/data/ | head -20

      # ─── Install pnpm deps EARLY ─────────────────────────────────────
      # The WP01 v2 exporter (next step) imports from app/lib/*, which
      # has runtime deps. We also need the same node_modules for the
      # `pnpm build` step later, so install once here and reuse.
      - name: Install pnpm dependencies
        working-directory: app
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      # ─── WP01 v2: export canonical numbers + dataset JSONs ───────────
      # Runs the live TS pipeline (markowitz/illusion/persistence/BL/RP)
      # against app/public/data/ and writes:
      #   articles/numbers.tex   — \newcommand{KEY}{VALUE} (120 entries)
      #   articles/data/*.json   — 6 dataset JSONs for matplotlib
      # The paper does \input{numbers} so its text uses exactly the same
      # numbers as the website (no paper/site drift).
      - name: Export WP01 v2 numbers + data JSONs
        if: ${{ hashFiles('articles/wp01.tex') != '' }}
        working-directory: app
        run: |
          npx tsx scripts/export-wp01-data.ts
          echo "─── articles/numbers.tex (head) ───"
          head -20 ../articles/numbers.tex
          echo "─── articles/data/ ───"
          ls -la ../articles/data/

      # ─── WP01 v2: generate matplotlib figures ────────────────────────
      # Reads articles/data/*.json (from previous step) and writes 7 PDFs
      # to articles/figures/. The paper does \graphicspath{{figures/}}
      # and \includegraphics for each.
      - name: Setup Python for figures
        if: ${{ hashFiles('articles/figures/make_figures.py') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate WP01 v2 figures
        if: ${{ hashFiles('articles/figures/make_figures.py') != '' }}
        working-directory: articles/figures
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib numpy
          python make_figures.py
          ls -la *.pdf

      # ─── compile-stamp.tex with CI timestamp + commit SHA ────────────
      # Each .tex file does \input{compile-stamp} and the cover page
      # prints "Compilada em DD/MM/YYYY às HH:MM (BRT) • <sha>".
      - name: Generate articles/compile-stamp.tex
        run: |
          if [ -d articles ]; then
            TS=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y às %H:%M (BRT)')
            SHA=$(git rev-parse --short HEAD)
            printf '%% AUTO-GERADO em CI por deploy-pages.yml -- nao edite a mao.\n\\newcommand{\\COMPILESTAMP}{%s}\n\\newcommand{\\COMPILESHA}{%s}\n' "$TS" "$SHA" > articles/compile-stamp.tex
            echo "─── compile-stamp.tex gerado ───"
            cat articles/compile-stamp.tex
          fi

      # ─── Compile WP01 LaTeX → PDF ────────────────────────────────────
      # Uses xu-cheng/latex-action@v3 (TeX Live Docker image) — no
      # local TeX install needed in CI. Runs latexmk -pdf twice for
      # TOC + cross-refs. Output PDF stays in articles/; the next step
      # stages it into app/public/articles for Next.js to bundle.
      - name: Compile WP01 LaTeX → PDF
        if: ${{ hashFiles('articles/wp01.tex') != '' }}
        uses: xu-cheng/latex-action@v3
        with:
          root_file: wp01.tex
          working_directory: articles
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      # ─── Stage compiled PDFs into app/public/articles ────────────────
      # Next.js statically copies app/public/* into app/out/* at build,
      # which the assemble step below copies into _site/. The PDF then
      # lives at /applied_finance/articles/wp01.pdf on gh-pages.
      - name: Stage articles into app/public/articles
        run: |
          mkdir -p app/public/articles
          if [ -f articles/wp01.pdf ]; then
            cp articles/wp01.pdf app/public/articles/wp01.pdf
            echo "✓ wp01.pdf staged ($(stat -c%s articles/wp01.pdf) bytes)"
          fi
          # Also stage the .tex source so users can download it
          if [ -f articles/wp01.tex ]; then
            cp articles/wp01.tex app/public/articles/wp01.tex
          fi
          ls -la app/public/articles/ || true

      - name: Build frontend
        working-directory: app
        env:
          GH_PAGES_BASE: /applied_finance
        run: |
          # pnpm install already ran in "Install pnpm dependencies".
          pnpm build

      - name: Assemble payload
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r app/out/* _site/
          # Replace `_site/data` (came from app/out/data, which is whatever
          # Next.js copied from app/public/data at build time) with the
          # canonical, freshly-seeded copy. `cp -r SRC DEST` when DEST
          # exists as a directory NESTS src into dest (creating data/data),
          # so we rm first. This is the root cause of the
          # `data/data/data/data/data/kpis_per_ticker.json` mess on
          # gh-pages — every deploy added one more level.
          rm -rf _site/data
          if [ -d app/public/data ]; then cp -r app/public/data _site/data; fi
          # CRITICAL: tell GitHub Pages to skip Jekyll processing.
          # Without .nojekyll, Jekyll strips every directory starting with "_"
          # (including _next/static/chunks/), 404'ing all CSS and JS bundles.
          touch _site/.nojekyll

      - name: Force-push gh-pages (app-only refresh; preserves data/)
        run: |
          cd _site
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy app @ ${{ github.sha }}"
          git push -f "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
