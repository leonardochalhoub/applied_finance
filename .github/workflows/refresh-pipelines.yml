name: Refresh pipelines

on:
  schedule:
    - cron: "0 1 * * 2-6"  # ~22:00 BRT Mon-Fri (after B3 close)
  workflow_dispatch:
    inputs:
      skip_databricks:
        description: "Skip the Databricks DAG (re-uses artifacts already in the UC Volume). Use this to redeploy when only the frontend / schemas / validation changed."
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: refresh-pipelines
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST:    ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN:   ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CATALOG: finance_prd
    steps:
      - uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        working-directory: pipelines
        run: databricks bundle validate --target prod

      - name: Deploy bundle
        working-directory: pipelines
        run: databricks bundle deploy --target prod

      - name: Sync seed CSVs to UC Volume
        # The yf_ohlcv ingest reads from
        # /Volumes/${catalog}/bronze/reference/ticker_universe.csv — keep it
        # in sync with data/ticker_universe.csv on every run so a CSV edit
        # in main propagates without a manual `databricks fs cp`.
        run: |
          databricks fs mkdirs "dbfs:/Volumes/${DATABRICKS_CATALOG}/bronze/reference/" || true
          databricks fs cp "data/ticker_universe.csv" \
            "dbfs:/Volumes/${DATABRICKS_CATALOG}/bronze/reference/ticker_universe.csv" \
            --overwrite
          databricks fs cp "data/index_membership.csv" \
            "dbfs:/Volumes/${DATABRICKS_CATALOG}/bronze/reference/index_membership.csv" \
            --overwrite

      - name: Run daily refresh job
        if: ${{ inputs.skip_databricks != true }}
        working-directory: pipelines
        run: databricks bundle run --target prod job_mercado_br_daily_refresh

      - name: Copy artifacts out
        run: |
          mkdir -p _artifacts/data
          databricks fs cp -r \
            "dbfs:/Volumes/${DATABRICKS_CATALOG}/gold/artifacts/" \
            _artifacts/data/ \
            --overwrite

      - name: Validate JSON schemas
        # Warn-only: schema drift shouldn't block deployment of an otherwise
        # successful Databricks run. The strict contracts in
        # pipelines/contracts/*.schema.json remain the long-term north star,
        # but a single null aggregate or extra field should surface as a
        # warning rather than spike the gh-pages refresh.
        continue-on-error: true
        run: |
          npm i -g ajv-cli ajv-formats
          for schema in pipelines/contracts/*.schema.json; do
            name=$(basename "$schema" .schema.json)
            target="_artifacts/data/${name}.json"
            if [ -f "$target" ]; then
              echo "Validating $target against $schema"
              ajv validate --strict=false -c ajv-formats -s "$schema" -d "$target"
            fi
          done

      - name: Seed app/public/data with artifacts for build-time fs reads
        run: |
          # Wipe the seed dir first so previous-run residue (e.g., a
          # `data/data/...` nest that landed via a buggy assemble step,
          # or an obsolete artifact that's no longer in _artifacts/) can't
          # leak into the build. mclean_results.json is preserved if it
          # was committed in the repo (hand-maintained override pattern).
          mkdir -p app/public/data
          if git show HEAD:app/public/data/mclean_results.json > /tmp/mclean_repo.json 2>/dev/null; then
            cp /tmp/mclean_repo.json /tmp/mclean_override.json
          fi
          rm -rf app/public/data
          mkdir -p app/public/data
          cp -r _artifacts/data/. app/public/data/
          if [ -f /tmp/mclean_override.json ]; then
            cp /tmp/mclean_override.json app/public/data/mclean_results.json
          fi
          ls -la app/public/data/ || true

      - name: Build frontend
        working-directory: app
        env:
          GH_PAGES_BASE: /applied_finance
        run: |
          npm i -g pnpm@9
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
          pnpm build

      - name: Assemble gh-pages payload
        run: |
          rm -rf _site
          mkdir -p _site
          if [ -d app/out ]; then cp -r app/out/* _site/; fi
          # `cp -r SRC DEST` NESTS when DEST exists as a directory —
          # and `_site/data` already exists (Next.js exported
          # app/public/data → app/out/data). Without this rm, every
          # refresh-pipelines run added one more level to gh-pages:
          # data/data/data/data/data/kpis_per_ticker.json (5 levels
          # deep on 2026-05-24, with the freshest copy buried and the
          # top-level `/data/kpis_per_ticker.json` frozen at the
          # OLDEST commit). The frontend reads top-level, so the site
          # was stuck on the pre-IRBR 50-ticker artifact.
          rm -rf _site/data
          cp -r _artifacts/data _site/data
          # Mirror the deploy-pages McLean override so a force-push
          # from refresh-pipelines doesn't wipe a pending hand-fix.
          if git show HEAD:app/public/data/mclean_results.json > /tmp/mclean_repo.json 2>/dev/null; then
            cp /tmp/mclean_repo.json _site/data/mclean_results.json
          fi
          # GitHub Pages defaults to Jekyll, which strips every directory
          # whose name starts with "_" — including `_next/`, where every
          # Next.js bundled CSS and JS chunk lives. Without this sentinel
          # file, the site loads with no styling and no client JS (user
          # sees a bullet-list nav and unstyled headers — the exact
          # failure mode reported 2026-05-22 after the skip_databricks
          # redeploy). `deploy-pages.yml` already does this; mirroring it
          # here so refresh-pipelines deploys are also Jekyll-immune.
          touch _site/.nojekyll

      - name: Force-push gh-pages
        run: |
          cd _site
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Refresh ${{ github.run_number }} @ $(date -u +%FT%TZ)"
          git push -f "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
